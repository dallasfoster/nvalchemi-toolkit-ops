# NValchemi Toolkit Ops CI Workflow
#
# This workflow runs linting, pytest unit testing, and coverage reporting.
#
# TRIGGERS:
# - Push to main branch or pull-request branches
# - Merge group events (when PRs are merged via merge queue)
# - Scheduled runs (daily at 7 AM UTC)
#
# WORKFLOW OVERVIEW:
# 1. changed-files: Detects which files have changed compared to main branch
# 2. lint: Runs static code checks and linting via pre-commit
# 3. get-pr-labels: Retrieves PR labels for conditional job execution
# 4. test: Runs pytest unit tests with coverage (on GPU runner)
# 5. verify-status: Verifies all jobs completed successfully

name: "CI"

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "0 7 * * *" # Runs at 7 AM UTC daily

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/uv-cache
  PRE_COMMIT_HOME: /tmp/pre-commit-cache

jobs:
  # ============================================================================
  # CHANGED FILES DETECTION
  # ============================================================================
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: "recursive"

      - name: Get merge-base commit
        id: merge-base
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "HEAD~1")
          echo "merge-base=$MERGE_BASE" >> $GITHUB_OUTPUT
          echo "Merge-base commit: $MERGE_BASE"

      - uses: step-security/changed-files@v46
        id: changed-files
        with:
          base_sha: ${{ steps.merge-base.outputs.merge-base }}
          files: |
            **
            !**.md
            !.github/**
            !.gitignore
            .github/workflows/ci.yml

      - name: Show output
        run: |
          echo '${{ toJSON(steps.changed-files.outputs) }}'

  # ============================================================================
  # LINTING STAGE
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Install dependencies and run lint
        run: |
          uv sync --extra torch --extra jax
          make lint

  # ============================================================================
  # GET PR LABELS (for copy-pr-bot integration)
  # ============================================================================
  get-pr-labels:
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.get-labels.outputs.labels || steps.get-labels-empty.outputs.labels }}
    steps:
      - name: Get PR number from branch
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        id: get-pr-num
        run: |
          PR_NUM=$(echo ${{ github.ref_name }} | grep -oE '[0-9]+$')
          echo "pr_num=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Get PR labels
        id: get-labels
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/pulls/${{ steps.get-pr-num.outputs.pr_num }} --jq '[.labels[].name]' || echo "[]")
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "Retrieved labels: $LABELS"

      - name: Set empty labels for non-PR branches
        if: ${{ !startsWith(github.ref, 'refs/heads/pull-request/') }}
        id: get-labels-empty
        run: |
          echo "labels=[]" >> $GITHUB_OUTPUT
          echo "Set empty labels for non-PR branch"

  # ============================================================================
  # TEST STAGE (GPU Runner)
  # ============================================================================
  test:
    name: Test CUDA 13 py${{ matrix.python-version }}
    needs:
      - lint
      - get-pr-labels
      - changed-files
    runs-on: linux-amd64-gpu-h100-latest-1
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    container:
      image: nvcr.io/nvidia/cuda:13.1.0-runtime-ubuntu24.04
      options: --gpus all
    if: |
      (github.event_name == 'schedule') ||
      contains(fromJSON(needs.get-pr-labels.outputs.labels || '[]'), 'ciflow:all') ||
      (
        !contains(fromJSON(needs.get-pr-labels.outputs.labels || '[]'), 'ciflow:skip') &&
        (needs.changed-files.outputs.any_changed == 'true')
      ) ||
      (
        (github.event_name == 'merge_group') &&
        (needs.changed-files.outputs.any_changed == 'true')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install apt requirements
        env:
          DEBIAN_FRONTEND: "noninteractive"
          TZ: "Etc/UTC"
        run: |
          apt-get update && \
          apt-get install -y curl \
            git \
            build-essential

      - name: Setup UV
        env:
          UV_VERSION: "0.9.25"
          UV_CHECKSUM: "1e1aea6cead1a07a7cee24f6eaec415b"
        run: |
          UV_INSTALLER=$(mktemp)
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" -o "$UV_INSTALLER"
          echo "${UV_CHECKSUM}  ${UV_INSTALLER}" | md5sum -c -
          sh "$UV_INSTALLER"
          rm "$UV_INSTALLER"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --seed --python ${{ matrix.python-version }}
          uv sync --extra torch --extra jax
          uv pip install -r test/test-requires.txt

      # CONDITIONAL LOGIC BASED ON EVENT TYPE
      #
      # PR branches use push events to refs/heads/pull-request/*, not the
      # pull_request event. Detect them via the branch name pattern.
      # Testmon databases are Python/CUDA-specific because testmon keys its
      # dependency database by the interpreter version and installed packages.
      # Coverage baselines are cached separately so stale coverage files do not
      # replace or mask the testmon dependency database.
      - name: Restore testmon cache (for PRs)
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        uses: actions/cache/restore@v4
        with:
          path: |
            .testmondata
            .testmondata-shm
            .testmondata-wal
          key: testmon-cache-main-py${{ matrix.python-version }}-cuda13-${{ github.run_id }}
          restore-keys: |
            testmon-cache-main-py${{ matrix.python-version }}-cuda13-

      - name: Restore coverage baseline (for PRs)
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        uses: actions/cache/restore@v4
        with:
          path: .coverage.baseline
          key: coverage-baseline-main-py${{ matrix.python-version }}-cuda13-${{ github.run_id }}
          restore-keys: |
            coverage-baseline-main-py${{ matrix.python-version }}-cuda13-

      - name: Prepare coverage baseline (for PRs)
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        run: |
          if [ -f .coverage.baseline ]; then
            echo "Using restored coverage baseline for PR coverage merge"
            mv .coverage.baseline coverage_main.dat
          else
            echo "No coverage baseline restored; reporting PR coverage only"
          fi

      - name: Run tests with testmon and coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          IS_PR=${{ startsWith(github.ref, 'refs/heads/pull-request/') }}
          if [[ "$IS_PR" == "true" ]]; then
            # PR: testmon selects affected tests, coverage traces them
            make testmon-coverage COVERAGE_BASELINE_FILE=coverage_main.dat
          else
            # Main/Schedule: build testmon DB, then full coverage without testmon
            rm -f .testmondata .testmondata-shm .testmondata-wal
            rm -f .coverage .coverage.* coverage_main.dat
            make testmon-collect
            make testmon-coverage PYTEST_TESTMON_FLAGS=""
          fi

      # Save one testmon DB and one coverage baseline per Python/CUDA version
      # from main/schedule runs. PR runs restore the newest matching pair.
      - name: Save testmon cache
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'schedule')
        uses: actions/cache/save@v4
        with:
          path: |
            .testmondata
            .testmondata-shm
            .testmondata-wal
          key: testmon-cache-main-py${{ matrix.python-version }}-cuda13-${{ github.run_id }}

      - name: Prepare coverage baseline
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'schedule')
        run: |
          cp .coverage .coverage.baseline

      - name: Save coverage baseline
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'schedule')
        uses: actions/cache/save@v4
        with:
          path: .coverage.baseline
          key: coverage-baseline-main-py${{ matrix.python-version }}-cuda13-${{ github.run_id }}

      - name: Upload coverage to Codecov
        if: github.event_name != 'merge_group' && github.event_name != 'schedule'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nvalchemiops.coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}-cuda13
          path: nvalchemiops.coverage.xml
          retention-days: 7

  test-cuda12:
    name: Test CUDA 12 py${{ matrix.python-version }}
    needs:
      - lint
    runs-on: linux-amd64-gpu-h100-latest-1
    timeout-minutes: 45
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    container:
      image: nvcr.io/nvidia/cuda:12.8.2-runtime-ubuntu24.04
      options: --gpus all
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install apt requirements
        env:
          DEBIAN_FRONTEND: "noninteractive"
          TZ: "Etc/UTC"
        run: |
          apt-get update && \
          apt-get install -y curl \
            git \
            build-essential

      - name: Setup UV
        env:
          UV_VERSION: "0.9.25"
          UV_CHECKSUM: "1e1aea6cead1a07a7cee24f6eaec415b"
        run: |
          UV_INSTALLER=$(mktemp)
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" -o "$UV_INSTALLER"
          echo "${UV_CHECKSUM}  ${UV_INSTALLER}" | md5sum -c -
          sh "$UV_INSTALLER"
          rm "$UV_INSTALLER"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --seed --python ${{ matrix.python-version }}
          uv sync --extra torch-cu12 --extra jax-cu12
          uv pip install -r test/test-requires.txt

      - name: Run tests with testmon and coverage
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          rm -f .testmondata .testmondata-shm .testmondata-wal
          rm -f .coverage .coverage.* coverage_main.dat
          make testmon-collect
          make testmon-coverage PYTEST_TESTMON_FLAGS=""

      - name: Save testmon cache
        uses: actions/cache/save@v4
        with:
          path: |
            .testmondata
            .testmondata-shm
            .testmondata-wal
          key: testmon-cache-main-py${{ matrix.python-version }}-cuda12-${{ github.run_id }}

      - name: Prepare coverage baseline
        run: |
          cp .coverage .coverage.baseline

      - name: Save coverage baseline
        uses: actions/cache/save@v4
        with:
          path: .coverage.baseline
          key: coverage-baseline-main-py${{ matrix.python-version }}-cuda12-${{ github.run_id }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}-cuda12
          path: nvalchemiops.coverage.xml
          retention-days: 7

  # ============================================================================
  # VERIFY STATUS
  # ============================================================================
  verify-status:
    needs:
      - lint
      - get-pr-labels
      - test
      - test-cuda12
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job statuses
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Some jobs have failed or been cancelled!"
            exit 1
          else
            echo "All jobs have completed successfully or been skipped!"
            exit 0
          fi
