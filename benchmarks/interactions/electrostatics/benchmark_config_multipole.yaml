# Multipole Electrostatics Benchmark Configuration
# ================================================
# Dedicated config for the multipole methods (torch-only):
#   - multipole_ewald  (direct-k-space GTO-Ewald, charges/dipoles/quadrupoles)
#   - multipole_pme    (particle-mesh GTO-Ewald, charges/dipoles/quadrupoles)
#
# Self-contained: `methods` and `l_max` below are read by the driver when the
# corresponding CLI flags are omitted (CLI still overrides). So this runs the
# full multipole sweep with just:
#
#     python benchmark_electrostatics.py --config benchmark_config_multipole.yaml
#
# Override the multipole order from the CLI, e.g. charges-only / +dipoles:
#
#     python benchmark_electrostatics.py --config benchmark_config_multipole.yaml --l-max 0
#     python benchmark_electrostatics.py --config benchmark_config_multipole.yaml --l-max 1
#
# The backend defaults to torch (multipole has no JAX / torchpme reference).
# System sizes are smaller than the monopole config because the l=2 path
# (quadrupole spread/gather + Hessian channels) is substantially heavier.

parameters:
  warmup_iterations: 3
  timing_iterations: 10
  dtype: float64 # multipole physics is validated in fp64; use float32 for speed
  device: cuda # cuda or cpu

# Multipole methods (torch-only). Read when --method is not passed on the CLI.
methods:
  - multipole_ewald
  - multipole_pme

# Maximum multipole order: 0 = charges, 1 = +dipoles, 2 = +quadrupoles.
# Read when --l-max is not passed on the CLI.
l_max: 1

# Wrap the benchmarked composite in torch.compile. Read when neither --compile
# nor --no-compile is passed. The multipole torch wrappers are compile-clean
# (opaque Warp custom ops -> no graph breaks); the first call per input shape
# pays the compile cost, which the warmup phase absorbs.
compile: true

# System configurations. Capped well below the monopole sweep because the
# l_max=2 spread/gather + reciprocal Q channels are much more expensive.
systems:
  # Single-system scaling study (CsCl, 2*size**3 atoms; up to ~16k atoms).
  - name: cscl_single
    system_type: cscl
    mode: single
    supercell_sizes: [1, 3, 5, 7, 10, 15, 20, 25, 30]

  # Batched throughput — tiny systems (16 atoms each).
  # - name: cscl_batched_size2
  #   system_type: cscl
  #   mode: batched
  #   base_supercell_size: 2 # 2*2^3 = 16 atoms per system
  #   batch_sizes: [1, 4, 16, 64, 256, 512]

  # # Batched — small systems (54 atoms each).
  # - name: cscl_batched_size3
  #   system_type: cscl
  #   mode: batched
  #   base_supercell_size: 3 # 2*3^3 = 54 atoms per system
  #   batch_sizes: [1, 4, 16, 64, 256]

  # # Batched — medium systems (250 atoms each).
  # - name: cscl_batched_size5
  #   system_type: cscl
  #   mode: batched
  #   base_supercell_size: 5 # 2*5^3 = 250 atoms per system
  #   batch_sizes: [1, 4, 16, 64]

# Components to benchmark.
components:
  # - full
  # - real
  - reciprocal

# Whether to compute forces and virial (both supported for multipole l=0/1/2).
compute_forces: true
compute_virial: false
